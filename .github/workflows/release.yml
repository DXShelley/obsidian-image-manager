name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify release version matches manifest and versions map
        run: |
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('manifest.json','utf8')); const versions=JSON.parse(fs.readFileSync('versions.json','utf8')); const tag=process.env.GITHUB_REF_NAME; if(tag!==manifest.version){console.error(`Tag ${tag} must exactly match manifest version ${manifest.version}.`); process.exit(1);} if(!Object.prototype.hasOwnProperty.call(versions, manifest.version)){console.error(`versions.json is missing ${manifest.version}.`); process.exit(1);} if(versions[manifest.version]!==manifest.minAppVersion){console.error(`versions.json maps ${manifest.version} to ${versions[manifest.version]}, expected ${manifest.minAppVersion}.`); process.exit(1);} console.log(`Release version ${tag} verified.`);"
      - run: npm ci
      - run: npm run validate
      - run: npm run build
      - name: Package install zip
        run: zip -9 note-image-manager.zip manifest.json main.js styles.css
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css
            note-image-manager.zip
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            manifest.json
            main.js
            styles.css
            note-image-manager.zip
